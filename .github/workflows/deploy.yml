name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow running manually from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the rights needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-progress runs (but don't
# cancel the build, only the waiting-to-deploy step)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history is needed for lastUpdated timestamps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: documentation/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: documentation

      - name: Build website
        run: npm run build
        working-directory: documentation

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The Docusaurus output directory lives inside the sub-folder
          path: documentation/build

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
